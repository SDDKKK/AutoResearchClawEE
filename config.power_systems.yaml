project:
  name: "power-systems-optimization"
  mode: "full-auto"

research:
  topic: "Optimal Reconfiguration of Active Distribution Networks Using MILP Formulation"
  domains:
    - "electrical-engineering"
    - "power-systems"
    - "optimization"
  daily_paper_count: 10
  quality_threshold: 4.0

runtime:
  timezone: "Asia/Shanghai"
  max_parallel_tasks: 3
  approval_timeout_hours: 12
  retry_limit: 2

notifications:
  channel: "console"
  target: ""
  on_stage_start: true
  on_stage_fail: true
  on_gate_required: true

knowledge_base:
  backend: "markdown"
  root: "docs/kb"

openclaw_bridge:
  use_cron: false
  use_message: false
  use_memory: false
  use_sessions_spawn: false
  use_web_fetch: false
  use_browser: false

llm:
  provider: "openai-compatible"
  base_url: "https://open.bigmodel.cn/api/paas/v4"
  api_key_env: "ZHIPU_API_KEY"
  api_key: ""                              # ← 填入 Zhipu API key，或设置 ZHIPU_API_KEY 环境变量
  primary_model: "glm-5-turbo"
  fallback_models:
    - "glm-4.7"
  s2_api_key: ""
  notes: "Zhipu GLM via OpenAI-compatible API"

  # ============================================================================
  # Provider Pool — automatic rotation on 429 / connection errors
  # ============================================================================
  # Format: OpenRouter style. Each entry is an independent provider endpoint.
  # Models use "provider/model" naming convention (OpenRouter style).
  # The client expands into a flat list and round-robins on failure.
  #
  # To add a provider:
  #   - name: "MyProvider"
  #     base_url: "https://openrouter.ai/api/v1"
  #     api_key: "sk-or-xxx"
  #     models:
  #       - "anthropic/claude-3.5-sonnet"
  #       - "google/gemini-pro-1.5"
  # ============================================================================
  provider_pool:
    # --- OpenRouter (https://openrouter.ai) ---
    # Get API key: https://openrouter.ai/keys
    # Browse models: https://openrouter.ai/models
    - name: "OpenRouter"
      base_url: "https://openrouter.ai/api/v1"
      api_key: ""                           # ← 填入 OpenRouter API key
      models:
        - "openrouter/hunter-alpha"         
        - "openrouter/healer-alpha"
        - “minimax/minimax-m2.5:free”
        - “arcee-ai/trinity-large-preview:free”
        - “stepfun/step-3.5-flash:free”
    # --- 备用示例 (取消注释并填入 key 即可启用) ---
    # - name: "DeepSeek"
    #   base_url: "https://api.deepseek.com/v1"
    #   api_key: ""
    #   models:
    #     - "deepseek-chat"
    #     - "deepseek-reasoner"

security:
  hitl_required_stages: [5, 9, 20]
  allow_publish_without_approval: false
  redact_sensitive_logs: true

experiment:
  mode: "sandbox"
  time_budget_sec: 300
  max_iterations: 10
  metric_key: "total_loss"
  metric_direction: "minimize"
  sandbox:
    python_path: ".venv/bin/python3"
    gpu_required: false
    max_memory_mb: 4096

export:
  target_conference: "ieee_tpwrs"
  authors: "Anonymous"

prompts:
  custom_file: "prompts.power_systems.yaml"
