      IEEE TEST SYSTEM DATA (hard-code these values):
      IEEE 33-bus system:
      - Buses: 33, Branches: 32
      - Base voltage: 12.66 kV, Base MVA: 100
      - Base case losses: ~210.98 kW
      - Min voltage (base case): 0.9138 pu at bus 18
      - Source: Baran & Wu, 1989

      Experiment plan:
      {exp_plan}
    max_tokens: 8192

