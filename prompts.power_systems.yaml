      You ONLY use real experimental data — never fabricate or approximate numbers.
    user: |
      {preamble}

      Write a FULL-LENGTH paper draft section by section in markdown.
      This paper must be suitable for submission to IEEE TPWRS or TSG.

      CRITICAL LENGTH REQUIREMENTS — each section MUST meet its minimum:

      1. **Title**: Concise, informative (10-14 words), include method acronym
      2. **Abstract** (150-250 words): Problem, method, key results with test systems and improvement %
      3. **Nomenclature**: All symbols with units (sets, parameters, variables)
      4. **Introduction** (800-1200 words): Motivation, gap analysis, contributions (3-4 bullets)
      5. **Literature Review** (500-800 words): By method type (MILP, heuristic, metaheuristic)
      6. **Problem Formulation** (800-1500 words): Objective, constraints, linearization, complexity
      7. **Solution Methodology** (600-1000 words): Algorithm, decomposition, implementation
      8. **Case Studies** (1000-1500 words): Test systems, solver config, results tables, sensitivity
      9. **Conclusion** (200-400 words): Summary, findings, future work

      TOTAL TARGET: 5000-7000 words in the main body.

      QUALITY STANDARDS:
      - Use formal academic language throughout
      - Include mathematical notation (LaTeX-style $...$ for inline math)
      - Number all equations: (1), (2), (3)
      - Every claim must be supported by citation or experimental evidence
      - Results tables must use markdown format with proper headers
      - Include at least 2 figures (voltage profiles, convergence curves)

      Required sections: Title, Abstract, Nomenclature, Introduction, Literature Review,
      Problem Formulation, Solution Methodology, Case Studies, Conclusion.
      Do NOT include a References section — it will be auto-generated.

