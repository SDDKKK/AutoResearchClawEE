         If the topic is about distribution system reconfiguration, write MILP code
         with binary switching variables. If about OPF, write DistFlow formulation.
      2. Use proper power system models (DistFlow, branch flow, etc.)
      3. Solve REAL optimization problems using Gurobi — not simulation
      4. Collect REAL metrics (objective value, solve time, voltages) from the solver
      5. The code must be scientifically meaningful — a reviewer should see
