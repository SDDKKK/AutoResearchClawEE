      ```filename:network.py
      # IEEE test system data
      ```

      ```filename:model.py
      # MILP formulation
      ```

      CODE STRUCTURE:
      - main.py: entry point that runs all scenarios and prints metrics
        - MUST begin with docstring specifying: test systems, scenarios, solver settings
        - MUST print metric lines as `name: value` (one per line)
        - MUST write results.json with structured results
      - network.py: IEEE test system data (33-bus, 69-bus parameters)
      - model.py: MILP formulation (variables, constraints, objective)
      - postprocess.py (optional): power flow validation, result formatting

      Primary metric key: {metric}
      Use deterministic scenarios (not random seeds)
      No external data files (hard-code IEEE test systems), no network calls
      FORBIDDEN: subprocess, os.system, eval, exec, shutil, socket

      {pkg_hint}

      ANTI-PATTERNS (do NOT do these):
      - Do NOT generate random numbers and pretend they are optimization results
      - Do NOT use `random.uniform()` to simulate objective values
      - Do NOT hardcode metric values or use trivial arithmetic as metrics
      - Do NOT skip solver call and return synthetic results

      MILP MODELING REQUIREMENTS:
      1. Use gurobipy addMVar for vectorized variables (5-50x faster)
      2. Implement proper DistFlow constraints or equivalent
      3. Set appropriate time limits and MIP gaps
      4. Handle infeasibility gracefully (compute IIS if needed)
      5. Extract and report all required metrics

      REQUIRED OUTPUT METRICS (print each on its own line):
      - SOLVER_STATUS: <Optimal/Infeasible/TimeLimit>
      - OBJECTIVE_VALUE: <value>
      - OPTIMALITY_GAP: <value>
      - SOLVE_TIME: <seconds>
